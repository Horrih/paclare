name: Run tests with pytest

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ghcr.io/astral-sh/uv:python3.10-alpine
    steps:
    - name: Run tests with pytest
      run: uv run pytest
    - name: Run mypy checker
      run: uv run mypy .
    - name: Run ruff linter
      run: uv run ruff check
    - name: Run ruff formatter
      run: uv run ruff format check
